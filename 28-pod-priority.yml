---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100
globalDefault: false
description: "Low services"
---
apiVersion: v1
kind: Pod
metadata:
  name: low-priority
spec:
  priorityClassName: low-priority
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        cpu: 900m
        memory: 512Mi
      limits:
        cpu: 1200m
        memory: 1000Mi
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000000
globalDefault: false
description: "Critical services — preempts lower-priority pods if needed"
---
apiVersion: v1
kind: Pod
metadata:
  name: high-priority
spec:
  priorityClassName: high-priority
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        cpu: 900m
        memory: 512Mi
      limits:
        cpu: 1200m
        memory: 1000Mi





