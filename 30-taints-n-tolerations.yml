apiVersion: v1
kind: Pod
metadata:
  name: no-toleration
spec:
  containers:
    - name: nginx
      image: nginx:1.27
---
apiVersion: v1
kind: Pod
metadata:
  name: with-toleration
spec:
  tolerations:
    - key: apps
      operator: Equal
      value: roboshop
      effect: NoSchedule
  containers:
    - name: nginx
      image: nginx:1.27
---
apiVersion: v1
kind: Pod
metadata:
  name: with-other-toleration
spec:
  containers:
    - name: nginx
      image: nginx:1.27
  tolerations:
    - key: apps
      operator: Equal
      value: project1
      effect: PreferNoSchedule

