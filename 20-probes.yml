## In this example, container will be up, But nginx wont be available for few seconds.
apiVersion: v1
kind: Pod
metadata:
  name: probe-delay-nginx
spec:
  containers:
  - name: nginx
    image: mohanacr89.azurecr.io/delay-nginx
    imagePullPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: curl-cli
spec:
  containers:
  - name: redhat
    image: docker.io/redhat/ubi9
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-readiness
spec:
  containers:
  - name: nginx
    image: mohanacr89.azurecr.io/delay-nginx
    imagePullPolicy: Always
    readinessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 10
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-liveness
spec:
  containers:
  - name: nginx
    image: mohanacr89.azurecr.io/delay-nginx
    imagePullPolicy: Always
    readinessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 10
    livenessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 115
      periodSeconds: 5
      failureThreshold: 3
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-startup
spec:
  containers:
  - name: nginx
    image: mohanacr89.azurecr.io/delay-nginx
    imagePullPolicy: Always
    startupProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 10
    readinessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 3
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 30
      periodSeconds: 3
      failureThreshold: 3


